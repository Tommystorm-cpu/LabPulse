# Single source of truth for every user-facing LabPulse SMS template.
#
# Alert title/message values are Home Assistant Jinja expressions. LabPulse
# placeholders such as [[ service.label ]] are expanded by the generator before
# Home Assistant receives the generated package. The SMS worker replaces
# {current_measurement} after Home Assistant has evaluated the surrounding message.

alerts:
  service_fault:
    title: >-
      "LabPulse Service Fault: [[ service.label ]]"
    message: >-
      "LabPulse cannot communicate with [[ service.label ]]. All measurements from this service are temporarily unavailable.\nService status: {current_measurement}."

  service_recovery:
    title: >-
      "LabPulse Service Restored: [[ service.label ]]"
    message: >-
      "Communication with [[ service.label ]] has been restored. Telemetry is available again.\nDowntime: " ~ (downtime_seconds | string) ~ " seconds.\nService status: {current_measurement}."

  measurement_warning:
    title: >-
      "LabPulse Danger Warning: [[ service.label ]] - [[ measurement.label ]] is in danger"
    message: >-
      "Current Measurement: {current_measurement}. \nDanger threshold: " ~ threshold ~ ". \nEvidence: " ~ (observed | round(1) | string) ~ "% of the past " ~ (window | string) ~ " seconds spent in danger zone; required " ~ states('[[ measurement.entities.required_danger_percent ]]') ~ "% for warning. \nManual intervention may be required."

  measurement_recovery:
    title: >-
      "LabPulse Recovery Alert: [[ service.label ]] - [[ measurement.label ]] has recovered from a danger state."
    message: >-
      "Current Measurement: {current_measurement}. \nRecovered after " ~ states('[[ measurement.entities.required_recovery_seconds ]]') ~ " seconds in the deadband-adjusted safe zone. \nThresholds: " ~ states('[[ measurement.entities.minimum_threshold ]]') ~ " to " ~ states('[[ measurement.entities.maximum_threshold ]]') ~ "; deadband " ~ states('[[ measurement.entities.recovery_deadband ]]') ~ "."

  measurement_sensor_fault:
    title: >-
      "LabPulse Sensor Fault Alert: [[ service.label ]] - [[ measurement.label ]]"
    message: >-
      "Sensor fault reason: " ~ reason ~ ". \nService status: " ~ service_status ~ "." ~ "\nCurrent Measurement: {current_measurement}"

  measurement_sensor_recovery:
    title: >-
      "LabPulse Sensor Restored: [[ service.label ]] - [[ measurement.label ]]"
    message: >-
      "Valid numeric telemetry resumed. \nService status: " ~ states('[[ service.status_entity.entity_id ]]') ~ ". \nAlarm state: " ~ states('[[ measurement.entities.alarm_state ]]') ~ "." ~ "\nCurrent Measurement: {current_measurement}"

  power_warning:
    title: >-
      "LabPulse Power Outage Alert"
    message: >-
      "External power has been lost and [[ service.label ]] is running on UPS battery. " ~ "Battery level: " ~ (states('[[ power.battery_level.mqtt_entity.entity_id ]]') ~ "%" if is_number(states('[[ power.battery_level.mqtt_entity.entity_id ]]')) else "unavailable") ~ ".\nBattery voltage: {current_measurement} V.\nThe GPIO6 signal remained absent for [[ power.config.outage_confirm_seconds ]] seconds."

  power_recovery:
    title: >-
      "LabPulse Power Recovery Alert"
    message: >-
      "External power has been restored after " ~ (outage_duration | string) ~ " seconds. " ~ "Battery level: " ~ (states('[[ power.battery_level.mqtt_entity.entity_id ]]') ~ "%" if is_number(states('[[ power.battery_level.mqtt_entity.entity_id ]]')) else "unavailable") ~ ".\nBattery voltage: {current_measurement} V.\nThe GPIO6 signal remained present for [[ power.config.restore_confirm_seconds ]] seconds."

  power_sensor_fault:
    title: >-
      "LabPulse Sensor Fault Alert: [[ service.label ]] - External Power Detection"
    message: >-
      "The X1200 GPIO6 external-power signal is unavailable or invalid. This is being treated as a sensor fault, not a power outage.\nRaw GPIO state: {current_measurement}.\nService status: " ~ states('[[ service.status_entity.entity_id ]]') ~ "."

  power_sensor_recovery:
    title: >-
      "LabPulse Sensor Restored: [[ service.label ]] - External Power Detection"
    message: >-
      "The X1200 GPIO6 external-power signal is available again.\nCurrent mains state: {current_measurement}.\nService status: " ~ states('[[ service.status_entity.entity_id ]]') ~ "."

formatting:
  test_prefix: "[TEST]"
  unsubscribe_footer: >-
    If you wish to stop receiving messages from LabPulse, reply with UNSUBSCRIBE. To resubscribe, message SUBSCRIBE

commands:
  unsubscribe_confirmation: >-
    You have been unsubscribed from LabPulse messages. Reply SUBSCRIBE to receive messages again.
  subscribe_confirmation: >-
    You have been subscribed to LabPulse messages. Reply UNSUBSCRIBE to stop receiving messages.

notifications:
  phone_book:
    title: >-
      "LabPulse Phone Book Notification"
    message: >-
      "You are receiving this message because your phone number is registered for LabPulse monitoring alerts. No action is required. To pause notifications, reply UNSUBSCRIBE to this phone number. To re-enable notifications, reply SUBSCRIBE. For permanent removal, contact t.k.davey@lancaster.ac.uk. (This message was triggered manually from the LabPulse dashboard)"
