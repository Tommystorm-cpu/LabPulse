# Editable starter dashboard seed.
#
# This file controls the dashboard created by:
#
#   ./generate_homeassistant_config.sh --reset-dashboard
#
# It is only used when resetting/seeding the dashboard. Once Home Assistant has
# created .storage/lovelace, normal generator runs preserve the user's edited
# dashboard exactly.

lovelace:
  version: 1
  minor_version: 1
  key: lovelace
  monitor_view:
    title: LabPulse Monitor
    path: labpulse-monitor
    type: sections
  alarm_setup_view:
    title: LabPulse Alarm Setup
    path: labpulse-alarm-setup
    type: sections

monitor_sections:
  heading_card:
    type: heading
    heading: "[[ service.section ]]"
    heading_style: title
    icon: "[[ service.icon ]]"
  service_heading_card:
    type: heading
    heading: "[[ service.label ]]"
    heading_style: subtitle
    icon: "[[ service.icon ]]"
  status_tile:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ service.status_entity_id ]]"
        name: Service status
      - entity: "[[ service.health_fault_active_entity ]]"
        name: Sensor hub fault active
      - entity: "[[ service.health_fault_started_entity ]]"
        name: Current fault started
    grid_options:
      columns: full
  reading_list:
    type: entities
    show_header_toggle: false
    grid_options:
      columns: full
    entities: []
  reading_entity:
    entity: "[[ reading.expected_entity_id ]]"
    name: "[[ reading.label ]]"

power_monitor:
  battery_gauge:
    type: gauge
    entity: "[[ power.battery_level.expected_entity_id ]]"
    name: UPS Battery Level
    min: 0
    max: 100
    needle: false
    severity:
      red: 0
      yellow: 25
      green: 50
    grid_options:
      columns: full
  reading_list:
    type: entities
    show_header_toggle: false
    grid_options:
      columns: full
    entities:
      - entity: "[[ power.state_entity ]]"
        name: Power state
      - entity: "[[ power.mains_present_entity ]]"
        name: External power present
      - entity: "[[ power.voltage.expected_entity_id ]]"
        name: UPS battery voltage
      - entity: "[[ power.last_outage_started_sensor_entity ]]"
        name: Last outage started
      - entity: "[[ power.last_outage_duration_sensor_entity ]]"
        name: Last outage duration

alarm_setup_sections:
  heading_card:
    type: heading
    heading: "[[ service.label ]] Alarm Setup"
    heading_style: title
    icon: mdi:tune-variant
  controls_toggle_tile:
    type: tile
    entity: "[[ reading.alarm_controls_expanded_entity ]]"
    name: "[[ reading.label ]]: Show Controls"
    grid_options:
      columns: full
  service_tuning_card:
    type: entities
    title: "[[ service.label ]] Timing"
    show_header_toggle: false
    entities:
      - entity: "[[ service.required_danger_percent_entity ]]"
        name: Required danger
      - entity: "[[ service.observation_window_seconds_entity ]]"
        name: Observation window
      - entity: "[[ service.required_recovery_seconds_entity ]]"
        name: Required recovery
  reading_settings_card:
    type: conditional
    conditions:
      - entity: "[[ reading.alarm_controls_expanded_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ reading.label ]] Alarm"
      show_header_toggle: false
      entities:
        - entity: "[[ reading.expected_entity_id ]]"
          name: Current Reading
        - entity: "[[ reading.alarm_state_entity ]]"
          name: Alarm state
        - entity: "[[ reading.alarm_mode_entity ]]"
          name: Alarm mode
        - entity: "[[ reading.alarm_muted_entity ]]"
          name: Muted
        - entity: "[[ reading.minimum_threshold_entity ]]"
          name: Minimum threshold
        - entity: "[[ reading.maximum_threshold_entity ]]"
          name: Maximum threshold
        - entity: "[[ reading.recovery_deadband_entity ]]"
          name: Recovery deadband
        - type: divider
        - entity: "[[ reading.observed_danger_percent_entity ]]"
          name: Observed danger
        - entity: "[[ reading.danger_zone_entity ]]"
          name: Danger zone
        - entity: "[[ reading.recovery_zone_entity ]]"
          name: Recovery zone
        - entity: "[[ reading.sensor_fault_zone_entity ]]"
          name: Sensor fault zone

global_alarm_setup:
  heading_card:
    type: heading
    heading: Notification Controls
    heading_style: title
    icon: mdi:message-cog
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.global_muted_entity ]]"
        name: Mute all notifications
      - entity: "[[ model.test_mode_entity ]]"
        name: Test mode

power_alarm_setup:
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ power.state_entity ]]"
        name: Power lifecycle state
      - entity: "[[ power.muted_entity ]]"
        name: Power alerts muted
      - type: divider
      - entity: "[[ power.mains_present_entity ]]"
        name: Confirmed external-power input
      - entity: "[[ power.mains_present.expected_entity_id ]]"
        name: Raw GPIO6 mains value
      - entity: "[[ power.sensor_fault_entity ]]"
        name: External-power sensor fault
      - entity: "[[ power.outage_active_entity ]]"
        name: Confirmed outage active
