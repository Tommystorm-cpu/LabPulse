# Editable starter dashboard seed.
#
# This file controls the dashboard created by:
#
#   ./generate_homeassistant_config.sh --reset-dashboard
#
# It is only used when resetting/seeding the dashboard. Once Home Assistant has
# created .storage/lovelace, normal generator runs preserve the user's edited
# dashboard exactly.

lovelace:
  version: 1
  minor_version: 1
  key: lovelace
  monitor_view:
    title: LabPulse Monitor
    path: labpulse-monitor
    type: sections
  alarm_setup_view:
    title: LabPulse Alarm Setup
    path: labpulse-alarm-setup
    type: sections

system_health:
  heading_card:
    type: heading
    heading: System Health
    heading_style: title
    icon: mdi:heart-cog
  status_tile:
    type: tile
    entity: "[[ service.status_entity_id ]]"
    grid_options:
      columns: full

monitor_sections:
  heading_card:
    type: heading
    heading: "[[ service.section ]]"
    heading_style: title
    icon: "[[ service.icon ]]"
  status_tile:
    type: tile
    entity: "[[ service.status_entity_id ]]"
    grid_options:
      columns: full
  reading_tile:
    type: tile
    entity: "[[ reading.expected_entity_id ]]"
    name: "[[ reading.label ]]"
    grid_options:
      columns: 4
  state_tile:
    type: tile
    entity: "[[ reading.alarm_state_entity ]]"
    name: State
    grid_options:
      columns: 4
  mute_tile:
    type: tile
    entity: "[[ reading.alarm_muted_entity ]]"
    name: Muted
    grid_options:
      columns: 4

alarm_setup_sections:
  heading_card:
    type: heading
    heading: "[[ service.label ]] Alarm Setup"
    heading_style: title
    icon: mdi:tune-variant
  controls_toggle_tile:
    type: tile
    entity: "[[ service.alarm_controls_expanded_entity ]]"
    name: Show controls
    grid_options:
      columns: full
  service_tuning_card:
    type: conditional
    conditions:
      - entity: "[[ service.alarm_controls_expanded_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ service.label ]] Timing"
      show_header_toggle: false
      entities:
        - entity: "[[ service.danger_ratio_percent_entity ]]"
          name: Danger ratio
        - entity: "[[ service.danger_window_seconds_entity ]]"
          name: Danger window
        - entity: "[[ service.recovery_seconds_entity ]]"
          name: Recovery time
        - entity: "[[ service.stale_timeout_seconds_entity ]]"
          name: Stale timeout
  reading_settings_card:
    type: conditional
    conditions:
      - entity: "[[ service.alarm_controls_expanded_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ reading.label ]] Alarm"
      show_header_toggle: false
      entities:
        - entity: "[[ reading.expected_entity_id ]]"
          name: Current reading
        - entity: "[[ reading.alarm_state_entity ]]"
          name: Alarm state
        - entity: "[[ reading.alarm_mode_entity ]]"
          name: Alarm mode
        - entity: "[[ reading.alarm_muted_entity ]]"
          name: Muted
        - entity: "[[ reading.minimum_threshold_entity ]]"
          name: Minimum threshold
        - entity: "[[ reading.maximum_threshold_entity ]]"
          name: Maximum threshold
        - entity: "[[ reading.recovery_deadband_entity ]]"
          name: Recovery deadband
        - type: divider
        - entity: "[[ reading.danger_ratio_entity ]]"
          name: Danger ratio
        - entity: "[[ reading.danger_zone_entity ]]"
          name: Danger zone
        - entity: "[[ reading.recovery_zone_entity ]]"
          name: Recovery zone
        - entity: "[[ reading.sensor_fault_zone_entity ]]"
          name: Sensor fault zone
