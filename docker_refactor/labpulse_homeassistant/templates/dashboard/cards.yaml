# Native Home Assistant card fragments for the generated LabPulse dashboard.
# Alarm fragments live here; view assembly lives in the dashboard/ package.

alarm_setup_sections:
  setup_mute_off:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "off"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Mute notifications
      icon: mdi:bell-off-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ setup.muted_entity ]]"
  setup_mute_on:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Unmute notifications
      icon: mdi:bell-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ setup.muted_entity ]]"
  shared_setup_mute_off:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "off"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Mute notifications
      icon: mdi:bell-off-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ setup.muted_entity ]]"
        confirmation:
          text: "[[ setup.shared_measurement_warning ]]"
  shared_setup_mute_on:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Unmute notifications
      icon: mdi:bell-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ setup.muted_entity ]]"
  measurement_tile:
    type: tile
    entity: "[[ measurement.mqtt_entity.entity_id ]]"
    name: "[[ measurement.label ]]"
    grid_options:
      columns: 7
    tap_action: {action: none}
    hold_action: {action: none}
    double_tap_action: {action: none}
    icon_tap_action: {action: none}
  alarm_state_tile:
    type: tile
    entity: "[[ measurement.entities.alarm_state ]]"
    name: Alarm state
    icon: mdi:alarm-light-outline
    grid_options:
      columns: 2
    tap_action: {action: none}
    hold_action: {action: none}
    double_tap_action: {action: none}
    icon_tap_action: {action: none}
  configure_closed_tile:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_controls_expanded ]]"
        state: "off"
    grid_options:
      columns: 3
    card:
      type: tile
      entity: "[[ measurement.entities.alarm_controls_expanded ]]"
      name: Configure
      icon: mdi:tune-variant
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ measurement.entities.alarm_controls_expanded ]]"
      icon_tap_action: {action: none}
  configure_open_tile:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_controls_expanded ]]"
        state: "on"
    grid_options:
      columns: 3
    card:
      type: tile
      entity: "[[ measurement.entities.alarm_controls_expanded ]]"
      name: Close
      icon: mdi:close
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ measurement.entities.alarm_controls_expanded ]]"
      icon_tap_action: {action: none}
  minimum_tile:
    type: tile
    entity: "[[ measurement.entities.minimum_threshold ]]"
    name: Minimum
    icon: mdi:arrow-collapse-down
    grid_options:
      columns: 4
    tap_action: {action: none}
    hold_action: {action: none}
    double_tap_action: {action: none}
    icon_tap_action: {action: none}
  maximum_tile:
    type: tile
    entity: "[[ measurement.entities.maximum_threshold ]]"
    name: Maximum
    icon: mdi:arrow-collapse-up
    grid_options:
      columns: 4
    tap_action: {action: none}
    hold_action: {action: none}
    double_tap_action: {action: none}
    icon_tap_action: {action: none}
  measurement_mute_off:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_muted ]]"
        state: "off"
    card:
      type: tile
      entity: "[[ measurement.entities.alarm_muted ]]"
      name: Notifications active
      icon: mdi:bell-ring-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ measurement.entities.alarm_muted ]]"
      icon_tap_action: {action: none}
  measurement_mute_on:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_muted ]]"
        state: "on"
    card:
      type: tile
      entity: "[[ measurement.entities.alarm_muted ]]"
      name: Notifications muted
      icon: mdi:bell-off-outline
      hide_state: true
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ measurement.entities.alarm_muted ]]"
      icon_tap_action: {action: none}
global_alarm_setup:
  heading_card:
    type: heading
    heading: Notification Controls
    heading_style: title
    icon: mdi:message-cog
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.entities.global_muted ]]"
        name: Mute all notifications
      - entity: "[[ model.entities.test_mode ]]"
        name: Test mode
  phone_book_button:
    type: tile
    entity: "[[ model.entities.phone_book_notification_script ]]"
    name: Send phone book notification
    icon: mdi:account-multiple-check
    hide_state: true
    grid_options:
      columns: full
    tap_action:
      action: perform-action
      perform_action: "[[ model.entities.phone_book_notification_script ]]"
      confirmation:
        text: >-
          Send the phone book notification to the active recipient list? Test mode uses only test recipients; live mode uses normal recipients. Nothing is sent while all notifications are muted.

power_alarm_setup:
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ service.entities.health_fault_active ]]"
        name: Sensor hub fault active
      - type: divider
      - entity: "[[ power.entities.state ]]"
        name: Power lifecycle state
      - entity: "[[ power.entities.muted ]]"
        name: Power alerts muted
      - type: divider
      - entity: "[[ power.entities.mains_present ]]"
        name: Confirmed external-power input
      - entity: "[[ power.mains_present.mqtt_entity.entity_id ]]"
        name: Raw GPIO6 mains value
      - entity: "[[ power.entities.sensor_fault ]]"
        name: External-power sensor fault
      - entity: "[[ power.entities.outage_active ]]"
        name: Confirmed outage active
