# Native Home Assistant card fragments for the generated LabPulse dashboard.
# Durable layout changes belong here or in yaml_dashboard.py.

alarm_setup_sections:
  setup_mute_tile:
    type: tile
    entity: "[[ setup.muted_entity ]]"
    name: Mute setup notifications
    icon: mdi:bell-off-outline
    grid_options:
      columns: full
  shared_setup_mute_off:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "off"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Mute setup notifications
      icon: mdi:bell-off-outline
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ setup.muted_entity ]]"
        confirmation:
          text: "[[ setup.shared_reading_warning ]]"
  shared_setup_mute_on:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Unmute setup notifications
      icon: mdi:bell-outline
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ setup.muted_entity ]]"
  controls_toggle_tile:
    type: tile
    entity: "[[ reading.alarm_controls_expanded_entity ]]"
    name: "[[ reading.label ]]: Show Controls"
    grid_options:
      columns: full
  reading_settings_card:
    type: conditional
    conditions:
      - entity: "[[ reading.alarm_controls_expanded_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ reading.label ]] Alarm"
      show_header_toggle: false
      entities:
        - entity: "[[ reading.expected_entity_id ]]"
          name: Current Reading
        - entity: "[[ reading.alarm_state_entity ]]"
          name: Alarm state
        - entity: "[[ reading.alarm_mode_entity ]]"
          name: Alarm mode
        - entity: "[[ reading.alarm_muted_entity ]]"
          name: Muted
        - entity: "[[ reading.minimum_threshold_entity ]]"
          name: Minimum threshold
        - entity: "[[ reading.maximum_threshold_entity ]]"
          name: Maximum threshold
        - entity: "[[ reading.recovery_deadband_entity ]]"
          name: Recovery deadband
        - type: divider
        - entity: "[[ reading.required_danger_percent_entity ]]"
          name: Required danger
        - entity: "[[ reading.observation_window_seconds_entity ]]"
          name: Observation window
        - entity: "[[ reading.required_recovery_seconds_entity ]]"
          name: Required recovery
        - type: divider
        - entity: "[[ reading.observed_danger_percent_entity ]]"
          name: Observed danger
        - entity: "[[ reading.danger_zone_entity ]]"
          name: Danger zone
        - entity: "[[ reading.recovery_zone_entity ]]"
          name: Recovery zone
        - entity: "[[ reading.sensor_fault_zone_entity ]]"
          name: Sensor fault zone

global_alarm_setup:
  heading_card:
    type: heading
    heading: Notification Controls
    heading_style: title
    icon: mdi:message-cog
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.global_muted_entity ]]"
        name: Mute all notifications
      - entity: "[[ model.test_mode_entity ]]"
        name: Test mode
  phone_book_button:
    type: button
    entity: "[[ model.phone_book_notification_script_entity ]]"
    name: Send phone book notification
    icon: mdi:account-multiple-check
    show_state: false
    tap_action:
      action: perform-action
      perform_action: "[[ model.phone_book_notification_script_entity ]]"
      confirmation:
        text: >-
          Send the phone book notification to the active recipient list? Test mode uses only test recipients; live mode uses normal recipients. Nothing is sent while all notifications are muted.

bulk_timing:
  heading_card:
    type: heading
    heading: Bulk Timing
    heading_style: title
    icon: mdi:timer-sync-outline
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.bulk_timing_target_entity ]]"
        name: Apply to
      - entity: "[[ model.bulk_required_danger_percent_entity ]]"
        name: Required danger
      - entity: "[[ model.bulk_observation_window_seconds_entity ]]"
        name: Observation window
      - entity: "[[ model.bulk_required_recovery_seconds_entity ]]"
        name: Required recovery
  apply_button:
    type: button
    entity: "[[ model.bulk_apply_timing_script_entity ]]"
    name: Apply timing to selected readings
    icon: mdi:timer-check-outline
    show_state: false
    tap_action:
      action: perform-action
      perform_action: "[[ model.bulk_apply_timing_script_entity ]]"
      confirmation:
        text: >-
          Replace all three timing values for every reading in the selected target?

power_alarm_setup:
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ service.health_fault_active_entity ]]"
        name: Sensor hub fault active
      - type: divider
      - entity: "[[ power.state_entity ]]"
        name: Power lifecycle state
      - entity: "[[ power.muted_entity ]]"
        name: Power alerts muted
      - type: divider
      - entity: "[[ power.mains_present_entity ]]"
        name: Confirmed external-power input
      - entity: "[[ power.mains_present.expected_entity_id ]]"
        name: Raw GPIO6 mains value
      - entity: "[[ power.sensor_fault_entity ]]"
        name: External-power sensor fault
      - entity: "[[ power.outage_active_entity ]]"
        name: Confirmed outage active
