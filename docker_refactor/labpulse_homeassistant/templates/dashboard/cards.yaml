# Native Home Assistant card fragments for the generated LabPulse dashboard.
# Alarm fragments live here; view assembly lives in the dashboard/ package.

alarm_setup_sections:
  setup_mute_tile:
    type: tile
    entity: "[[ setup.muted_entity ]]"
    name: Mute setup notifications
    icon: mdi:bell-off-outline
    grid_options:
      columns: full
  shared_setup_mute_off:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "off"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Mute setup notifications
      icon: mdi:bell-off-outline
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_on
        target:
          entity_id: "[[ setup.muted_entity ]]"
        confirmation:
          text: "[[ setup.shared_measurement_warning ]]"
  shared_setup_mute_on:
    type: conditional
    conditions:
      - entity: "[[ setup.muted_entity ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: tile
      entity: "[[ setup.muted_entity ]]"
      name: Unmute setup notifications
      icon: mdi:bell-outline
      tap_action:
        action: perform-action
        perform_action: input_boolean.turn_off
        target:
          entity_id: "[[ setup.muted_entity ]]"
  controls_toggle_tile:
    type: tile
    entity: "[[ measurement.entities.alarm_controls_expanded ]]"
    name: "[[ measurement.label ]]"
    icon: mdi:tune-variant
    hide_state: true
    tap_action:
      action: toggle
    icon_tap_action:
      action: toggle
  measurement_settings_card:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_controls_expanded ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ measurement.label ]]"
      show_header_toggle: false
      entities:
        - entity: "[[ measurement.entities.alarm_mode ]]"
          name: Alarm mode
        - entity: "[[ measurement.entities.alarm_muted ]]"
          name: Muted
        - entity: "[[ measurement.entities.minimum_threshold ]]"
          name: Minimum threshold
        - entity: "[[ measurement.entities.maximum_threshold ]]"
          name: Maximum threshold
        - entity: "[[ measurement.entities.recovery_deadband ]]"
          name: Recovery deadband
        - type: divider
        - entity: "[[ measurement.entities.required_danger_percent ]]"
          name: Required danger
        - entity: "[[ measurement.entities.observation_window_seconds ]]"
          name: Observation window
        - entity: "[[ measurement.entities.required_recovery_seconds ]]"
          name: Required recovery
  measurement_status_card:
    type: conditional
    conditions:
      - entity: "[[ measurement.entities.alarm_controls_expanded ]]"
        state: "on"
    grid_options:
      columns: full
    card:
      type: entities
      title: "[[ measurement.label ]]"
      show_header_toggle: false
      entities:
        - entity: "[[ measurement.mqtt_entity.entity_id ]]"
          name: Current measurement
        - entity: "[[ measurement.entities.alarm_state ]]"
          name: Alarm state
        - entity: "[[ measurement.entities.observed_danger_percent ]]"
          name: Observed danger
        - entity: "[[ measurement.entities.danger_zone ]]"
          name: Danger zone
        - entity: "[[ measurement.entities.recovery_zone ]]"
          name: Recovery zone
        - entity: "[[ measurement.entities.sensor_fault_zone ]]"
          name: Sensor fault zone

global_alarm_setup:
  heading_card:
    type: heading
    heading: Notification Controls
    heading_style: title
    icon: mdi:message-cog
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.entities.global_muted ]]"
        name: Mute all notifications
      - entity: "[[ model.entities.test_mode ]]"
        name: Test mode
  phone_book_button:
    type: tile
    entity: "[[ model.entities.phone_book_notification_script ]]"
    name: Send phone book notification
    icon: mdi:account-multiple-check
    hide_state: true
    grid_options:
      columns: full
    tap_action:
      action: perform-action
      perform_action: "[[ model.entities.phone_book_notification_script ]]"
      confirmation:
        text: >-
          Send the phone book notification to the active recipient list? Test mode uses only test recipients; live mode uses normal recipients. Nothing is sent while all notifications are muted.

bulk_timing:
  heading_card:
    type: heading
    heading: Bulk Timing
    heading_style: title
    icon: mdi:timer-sync-outline
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ model.entities.bulk_timing_target ]]"
        name: Apply to
      - entity: "[[ model.entities.bulk_required_danger_percent ]]"
        name: Required danger
      - entity: "[[ model.entities.bulk_observation_window_seconds ]]"
        name: Observation window
      - entity: "[[ model.entities.bulk_required_recovery_seconds ]]"
        name: Required recovery
  apply_button:
    type: tile
    entity: "[[ model.entities.bulk_apply_timing_script ]]"
    name: Apply timing to selected measurements
    icon: mdi:timer-check-outline
    hide_state: true
    grid_options:
      columns: full
    tap_action:
      action: perform-action
      perform_action: "[[ model.entities.bulk_apply_timing_script ]]"
      confirmation:
        text: >-
          Replace all three timing values for every measurement in the selected target?

power_alarm_setup:
  settings_card:
    type: entities
    show_header_toggle: false
    entities:
      - entity: "[[ service.entities.health_fault_active ]]"
        name: Sensor hub fault active
      - type: divider
      - entity: "[[ power.entities.state ]]"
        name: Power lifecycle state
      - entity: "[[ power.entities.muted ]]"
        name: Power alerts muted
      - type: divider
      - entity: "[[ power.entities.mains_present ]]"
        name: Confirmed external-power input
      - entity: "[[ power.mains_present.mqtt_entity.entity_id ]]"
        name: Raw GPIO6 mains value
      - entity: "[[ power.entities.sensor_fault ]]"
        name: External-power sensor fault
      - entity: "[[ power.entities.outage_active ]]"
        name: Confirmed outage active
