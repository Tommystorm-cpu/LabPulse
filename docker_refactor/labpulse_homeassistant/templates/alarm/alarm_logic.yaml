# Editable Home Assistant alarm state-machine seed.
#
# This file controls the generated helpers, zone sensors, history_stats sensors,
# and transition automations in packages/labpulse_generated.yaml.
# It is a LabPulse seed, not a Home Assistant package by itself. The nested
# `service` rules are expanded once per service; `reading` rules are expanded
# once per configured reading. alarm.py then reshapes them into native Home
# Assistant package sections.
#
# There are two template stages:
# - [[ ... ]] is replaced by the LabPulse Python generator.
# - {% ... %} and {{ ... }} are preserved for Home Assistant to evaluate.
#
# V1 states:
# - Normal
# - Danger
# - Sensor Fault
#
# Placeholders available in strings:
# - [[ service.name ]], [[ service.label ]], [[ service.service_id ]]
# - [[ reading.required_danger_percent_entity ]], [[ reading.observation_window_seconds_entity ]]
# - [[ reading.required_recovery_seconds_entity ]]
# - [[ reading.label ]], [[ reading.expected_entity_id ]]
# - [[ reading.alarm_controls_expanded_entity ]]
# - [[ reading.alarm_state_entity ]]
# - [[ reading.alarm_mode_entity ]], [[ reading.alarm_muted_entity ]]
# - [[ reading.danger_zone_entity ]], [[ reading.recovery_zone_entity ]]
# - [[ reading.sensor_fault_zone_entity ]], [[ reading.observed_danger_percent_entity ]]
# - [[ reading.minimum_threshold_entity ]], [[ reading.maximum_threshold_entity ]]
# - [[ reading.recovery_deadband_entity ]]
# - [[ model.sms_send_topic ]]

# User-editable alarm tuning values. Timing, percentage, thresholds, and
# deadband all belong to one physical reading.
input_numbers:
  global:
    - id: "labpulse_bulk_required_danger_percent"
      config:
        name: "Bulk Required Danger"
        min: 1
        max: 100
        step: 1
        initial: 70
        unit_of_measurement: "%"
        mode: box
    - id: "labpulse_bulk_observation_window_seconds"
      config:
        name: "Bulk Observation Window"
        min: 10
        max: 3600
        step: 10
        initial: 120
        unit_of_measurement: s
        mode: box
    - id: "labpulse_bulk_required_recovery_seconds"
      config:
        name: "Bulk Required Recovery"
        min: 0
        max: 3600
        step: 10
        initial: 120
        unit_of_measurement: s
        mode: box

  reading:
    # Required percentage of the observation window that must be dangerous
    # state can move from Normal to Danger.
    - id: "labpulse_[[ reading.reading_id ]]_required_danger_percent"
      config:
        name: "[[ reading.label ]] Required Danger"
        min: 1
        max: 100
        step: 1
        unit_of_measurement: "%"
        mode: box

    # Size of the sliding observation window measured by history_stats below.
    - id: "labpulse_[[ reading.reading_id ]]_observation_window_seconds"
      config:
        name: "[[ reading.label ]] Observation Window"
        min: 10
        max: 3600
        step: 10
        unit_of_measurement: s
        mode: box

    # The recovery-zone sensor must remain on for this required recovery time.
    - id: "labpulse_[[ reading.reading_id ]]_required_recovery_seconds"
      config:
        name: "[[ reading.label ]] Required Recovery"
        min: 0
        max: 3600
        step: 10
        unit_of_measurement: s
        mode: box

    # Thresholds define the danger zone. Which thresholds are active depends
    # on the reading's Low Only, High Only, Range, or Disabled alarm mode.
    - id: "labpulse_[[ reading.reading_id ]]_minimum_threshold"
      config:
        name: "[[ reading.label ]] Minimum Threshold"
        min: "[[ reading.threshold.range_min ]]"
        max: "[[ reading.threshold.range_max ]]"
        step: "[[ reading.threshold.step ]]"
        unit_of_measurement: "[[ reading.threshold.unit ]]"
        mode: box

    - id: "labpulse_[[ reading.reading_id ]]_maximum_threshold"
      config:
        name: "[[ reading.label ]] Maximum Threshold"
        min: "[[ reading.threshold.range_min ]]"
        max: "[[ reading.threshold.range_max ]]"
        step: "[[ reading.threshold.step ]]"
        unit_of_measurement: "[[ reading.threshold.unit ]]"
        mode: box

    # Recovery uses a smaller safe range than danger detection. This deadband
    # prevents a noisy value near a threshold repeatedly entering/leaving alarm.
    - id: "labpulse_[[ reading.reading_id ]]_recovery_deadband"
      config:
        name: "[[ reading.label ]] Recovery Deadband"
        min: 0
        max: "[[ reading.threshold.range_max ]]"
        step: "[[ reading.threshold.step ]]"
        unit_of_measurement: "[[ reading.threshold.unit ]]"
        mode: box

# Home Assistant helpers hold the visible state machine state and the user's
# choice of threshold behavior. Automations below are the only state writers.
input_selects:
  global:
    - id: "labpulse_bulk_alarm_timing_target"
      config:
        name: "Bulk Alarm Timing Target"
        options: "[[ model.bulk_timing_target_options ]]"

  reading:
    - id: "labpulse_[[ reading.reading_id ]]_alarm_state"
      config:
        name: "[[ reading.label ]] Alarm State"
        options:
          - Normal
          - Danger
          - Sensor Fault

    - id: "labpulse_[[ reading.reading_id ]]_alarm_mode"
      config:
        name: "[[ reading.label ]] Alarm Mode"
        options:
          - Disabled
          - Low Only
          - High Only
          - Range

input_booleans:
  global:
    # These gates affect delivery only. They never modify per-reading or power
    # mute helpers, so those choices survive global mute cycles unchanged.
    - id: "labpulse_global_notifications_muted"
      config:
        name: "LabPulse Global Notifications Muted"
    # This restore-state marker makes global mute default on only for the first
    # installation. Later restarts preserve the operator's mute choice.
    - id: "labpulse_first_install_initialized"
      config:
        name: "LabPulse First Installation Initialized"
    - id: "labpulse_notification_test_mode"
      config:
        name: "LabPulse Notification Test Mode"
        # Fail safe after every Home Assistant start. Operators must deliberately
        # turn test mode off before normal recipients can receive alerts.
        initial: true

  setup:
    # An independent delivery gate. This helper never writes to the global mute
    # or any per-reading mute, and Home Assistant restores it across restarts.
    - id: "[[ setup.muted_helper_id ]]"
      config:
        name: "[[ setup.label ]] Notifications Muted"

  service:
    # Persistent whole-service fault state. Omitting `initial` allows Home
    # Assistant to restore it across ordinary restarts.
    - id: "labpulse_[[ service.service_id ]]_service_fault_active"
      config:
        name: "[[ service.label ]] Service Fault Active"

  reading:
    # This persistent marker seeds each reading's timing exactly once. Omitting
    # `initial` lets Home Assistant restore it after later restarts.
    - id: "labpulse_[[ reading.reading_id ]]_alarm_timing_initialized"
      config:
        name: "[[ reading.label ]] Alarm Timing Initialized"

    # Dashboard presentation state only; it has no effect on alarm evaluation.
    - id: "labpulse_[[ reading.reading_id ]]_alarm_controls_expanded"
      config:
        name: "[[ reading.label ]] Show Alarm Controls"
        
    # Muting suppresses notifications and SMS, but state calculation continues.
    - id: "labpulse_[[ reading.reading_id ]]_alarm_muted"
      config:
        name: "[[ reading.label ]] Alarm Muted"

scripts:
  global:
    - id: "labpulse_send_phone_book_notification"
      config:
        alias: "Send LabPulse Phone Book Notification"
        icon: mdi:account-multiple-check
        mode: single
        sequence:
          - condition: state
            entity_id: "[[ model.global_muted_entity ]]"
            state: "off"
          - service: mqtt.publish
            data:
              topic: "[[ model.sms_send_topic ]]"
              qos: 1
              retain: false
              payload: >
                {{ {"request_id": "labpulse_phone_book_notification_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "notification", "service": "labpulse", "service_label": "LabPulse", "reading": "phone_book", "reading_label": "Phone book", "state": "Notification", "title": [[ sms.notifications.phone_book.title ]], "message": [[ sms.notifications.phone_book.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": none} | to_json }}

input_datetimes:
  service:
    - id: "labpulse_[[ service.service_id ]]_service_fault_started"
      config:
        name: "[[ service.label ]] Service Fault Started"
        has_date: true
        has_time: true

# Convert the instantaneous danger-zone signal into the observed percentage of
# the service window spent in danger. history_stats updates on source changes
# and otherwise once per minute.
sensors:
  reading:
    - platform: history_stats
      name: "[[ reading.observed_danger_percent_unique_id ]]"
      unique_id: "[[ reading.observed_danger_percent_unique_id ]]"
      entity_id: "[[ reading.danger_zone_entity ]]"
      state: "on"
      type: ratio
      start: >
        {{ now() - timedelta(seconds=states('[[ reading.observation_window_seconds_entity ]]') | int(120)) }}
      end: "{{ now() }}"

# These are calculated conditions, not persistent alarm states:
# - danger_zone: the current value is outside its active threshold(s)
# - recovery_zone: the current value is safely inside the recovery boundary
# - sensor_fault_zone: one reading is invalid while its service is available;
#   whole-service failures use the service-health lifecycle below
binary_sensors:
  service:
    # Only these values represent a whole-service acquisition failure.
    # Component-specific values such as X1200 gpio_fault remain healthy here
    # and continue through their dedicated alarm lifecycle.
    - name: "[[ service.health_unhealthy_unique_id ]]"
      unique_id: "[[ service.health_unhealthy_unique_id ]]"
      device_class: problem
      state: >
        {{ states('[[ service.status_entity_id ]]')
           in ['disconnected', 'reconnecting', 'error', 'offline', 'unknown', 'unavailable'] }}
      attributes:
        service_status: "{{ states('[[ service.status_entity_id ]]') }}"
        fault_confirm_seconds: "[[ service.health_fault_confirm_seconds ]]"
        recovery_confirm_seconds: "[[ service.health_recovery_confirm_seconds ]]"

  reading:
    # Non-numeric readings are handled by sensor_fault_zone, so this sensor is
    # deliberately off for invalid data rather than reporting threshold danger.
    - name: "[[ reading.danger_zone_unique_id ]]"
      unique_id: "[[ reading.danger_zone_unique_id ]]"
      device_class: problem
      state: >
        {% set mode = states('[[ reading.alarm_mode_entity ]]') %}
        {% set raw = states('[[ reading.expected_entity_id ]]') %}
        {% if mode == 'Disabled' or not is_number(raw) %}
          false
        {% else %}
          {% set value = raw | float %}
          {% set minimum = states('[[ reading.minimum_threshold_entity ]]') | float(0) %}
          {% set maximum = states('[[ reading.maximum_threshold_entity ]]') | float(0) %}
          {{ (mode == 'Low Only' and value < minimum)
             or (mode == 'High Only' and value > maximum)
             or (mode == 'Range' and (value < minimum or value > maximum)) }}
        {% endif %}

    # Apply the deadband inward: low alarms recover above minimum + deadband;
    # high alarms recover below maximum - deadband.
    - name: "[[ reading.recovery_zone_unique_id ]]"
      unique_id: "[[ reading.recovery_zone_unique_id ]]"
      state: >
        {% set mode = states('[[ reading.alarm_mode_entity ]]') %}
        {% set raw = states('[[ reading.expected_entity_id ]]') %}
        {% if not is_number(raw) %}
          false
        {% elif mode == 'Disabled' %}
          true
        {% else %}
          {% set value = raw | float %}
          {% set minimum = states('[[ reading.minimum_threshold_entity ]]') | float(0) %}
          {% set maximum = states('[[ reading.maximum_threshold_entity ]]') | float(0) %}
          {% set deadband = states('[[ reading.recovery_deadband_entity ]]') | float(0) %}
          {% set recovery_minimum = minimum + deadband %}
          {% set recovery_maximum = maximum - deadband %}
          {{ (mode == 'Low Only' and value >= recovery_minimum)
             or (mode == 'High Only' and value <= recovery_maximum)
             or (mode == 'Range' and value >= recovery_minimum and value <= recovery_maximum) }}
        {% endif %}

    # MQTT expire_after turns a reading unavailable only when samples stop.
    # An unchanged but repeatedly reported value therefore remains healthy.
    - name: "[[ reading.sensor_fault_zone_unique_id ]]"
      unique_id: "[[ reading.sensor_fault_zone_unique_id ]]"
      device_class: problem
      state: >
        {% set raw = states('[[ reading.expected_entity_id ]]') %}
        {% set service_blocked = is_state('[[ service.health_unhealthy_entity ]]', 'on')
           or is_state('[[ service.health_fault_active_entity ]]', 'on') %}
        {% if service_blocked %}
          {{ is_state('[[ reading.alarm_state_entity ]]', 'Sensor Fault') }}
        {% else %}
          {{ raw in ['unknown', 'unavailable', 'none', 'None', '']
             or not is_number(raw) }}
        {% endif %}

# State transition rules. Each automation is expanded once per reading.
# Notification actions are inside mute checks, while state changes are not.
automations:
  global:
    - alias: "LabPulse Initialize First Installation"
      mode: single
      trigger:
        - platform: homeassistant
          event: start
        - platform: event
          event_type: automation_reloaded
      condition:
        - condition: state
          entity_id: "input_boolean.labpulse_first_install_initialized"
          state: "off"
      action:
        - service: input_boolean.turn_on
          target:
            entity_id:
              - "[[ model.global_muted_entity ]]"
              - "input_boolean.labpulse_first_install_initialized"

  service_health:
    - alias: "LabPulse [[ service.label ]] Service Fault"
      mode: single
      trigger:
        - platform: state
          entity_id: "[[ service.health_unhealthy_entity ]]"
          to: "on"
          for: {seconds: "[[ service.health_fault_confirm_seconds ]]"}
        - platform: homeassistant
          event: start
      action:
        - choose:
            - conditions: "{{ trigger.platform == 'homeassistant' }}"
              sequence:
                - delay: {seconds: "[[ service.health_fault_confirm_seconds ]]"}
        - condition: state
          entity_id: "[[ service.health_unhealthy_entity ]]"
          state: "on"
        - condition: state
          entity_id: "[[ service.health_fault_active_entity ]]"
          state: "off"
        - service: input_datetime.set_datetime
          target: {entity_id: "[[ service.health_fault_started_entity ]]"}
          data:
            timestamp: "{{ as_timestamp(now()) - [[ service.health_fault_confirm_seconds ]] }}"
        - service: input_boolean.turn_on
          target: {entity_id: "[[ service.health_fault_active_entity ]]"}
        - choose:
            - conditions:
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] disconnected' }}
                    message: >
                      LabPulse cannot communicate with [[ service.label ]].
                      All readings from this service are temporarily unavailable.
                      Service status: {{ states('[[ service.status_entity_id ]]') }}.
                    notification_id: "labpulse_[[ service.service_id ]]_service_health"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {{ {"request_id": "labpulse_[[ service.service_id ]]_service_fault_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "sensor_fault", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "service_health", "reading_label": "Sensor hub", "state": "Sensor Fault", "title": [[ sms.alerts.service_fault.title ]], "message": [[ sms.alerts.service_fault.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ service.status_entity_id ]]')} | to_json }}

    - alias: "LabPulse [[ service.label ]] Service Restored"
      mode: single
      trigger:
        - platform: state
          entity_id: "[[ service.health_unhealthy_entity ]]"
          to: "off"
          for: {seconds: "[[ service.health_recovery_confirm_seconds ]]"}
        - platform: homeassistant
          event: start
      action:
        - choose:
            - conditions: "{{ trigger.platform == 'homeassistant' }}"
              sequence:
                - delay: {seconds: "[[ service.health_recovery_confirm_seconds ]]"}
        - condition: state
          entity_id: "[[ service.health_unhealthy_entity ]]"
          state: "off"
        - condition: state
          entity_id: "[[ service.health_fault_active_entity ]]"
          state: "on"
        - variables:
            fault_started: "{{ as_timestamp(states('[[ service.health_fault_started_entity ]]'), 0) }}"
            downtime_seconds: "{{ ([0, as_timestamp(now()) - fault_started] | max) | round(0) }}"
        - service: input_boolean.turn_off
          target: {entity_id: "[[ service.health_fault_active_entity ]]"}
        - choose:
            - conditions:
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] restored' }}
                    message: >
                      Communication with [[ service.label ]] has been restored.
                      Telemetry is available again. Downtime: {{ downtime_seconds }} seconds.
                    notification_id: "labpulse_[[ service.service_id ]]_service_health"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {{ {"request_id": "labpulse_[[ service.service_id ]]_service_recovery_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "recovery", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "service_health", "reading_label": "Sensor hub", "state": "Normal", "title": [[ sms.alerts.service_recovery.title ]], "message": [[ sms.alerts.service_recovery.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ service.status_entity_id ]]')} | to_json }}
  reading:
    - alias: "LabPulse [[ reading.label ]] Initialize Alarm Timing"
      mode: single
      trigger:
        - platform: homeassistant
          event: start
        - platform: event
          event_type: automation_reloaded
      condition:
        - condition: state
          entity_id: "[[ reading.alarm_timing_initialized_entity ]]"
          state: "off"
      action:
        - service: input_number.set_value
          target: {entity_id: "[[ reading.required_danger_percent_entity ]]"}
          data: {value: 70}
        - service: input_number.set_value
          target: {entity_id: "[[ reading.observation_window_seconds_entity ]]"}
          data: {value: 120}
        - service: input_number.set_value
          target: {entity_id: "[[ reading.required_recovery_seconds_entity ]]"}
          data: {value: 120}
        - service: input_boolean.turn_on
          target:
            entity_id: "[[ reading.alarm_timing_initialized_entity ]]"

    # Enter Danger only after the observed percentage reaches the required
    # percentage. The
    # Normal-state condition prevents repeat notifications while already alarmed.
    - alias: "LabPulse [[ reading.label ]] Danger"
      mode: single
      trigger:
        - platform: template
          value_template: >
            {{ is_state('[[ service.health_unhealthy_entity ]]', 'off')
               and is_state('[[ service.health_fault_active_entity ]]', 'off')
               and states('[[ reading.observed_danger_percent_entity ]]') | float(0)
               >= states('[[ reading.required_danger_percent_entity ]]') | float(70) }}
      condition:
        - condition: state
          entity_id: "[[ reading.alarm_state_entity ]]"
          state: "Normal"
        - condition: state
          entity_id: "[[ reading.sensor_fault_zone_entity ]]"
          state: "off"
        - condition: template
          value_template: "{{ not is_state('[[ reading.alarm_mode_entity ]]', 'Disabled') }}"
      action:
        - service: input_select.select_option
          target:
            entity_id: "[[ reading.alarm_state_entity ]]"
          data:
            option: Danger
        - choose:
            - conditions:
                - condition: state
                  entity_id: "[[ reading.alarm_muted_entity ]]"
                  state: "off"
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
                - condition: template
                  value_template: "[[ reading.setup_notifications_unmuted_template ]]"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] - [[ reading.label ]] warning' }}
                    message: >
                      {% set mode = states('[[ reading.alarm_mode_entity ]]') %}
                      {% set minimum = states('[[ reading.minimum_threshold_entity ]]') %}
                      {% set maximum = states('[[ reading.maximum_threshold_entity ]]') %}
                      {% set observed = states('[[ reading.observed_danger_percent_entity ]]') | float(0) %}
                      {% set window = states('[[ reading.observation_window_seconds_entity ]]') | int(120) %}
                      {% set danger_seconds = (observed * window / 100) | round(0) %}
                      {% set threshold = ('below ' ~ minimum if mode == 'Low Only' else 'above ' ~ maximum if mode == 'High Only' else 'outside ' ~ minimum ~ ' to ' ~ maximum) %}
                      [[ service.label ]] / [[ reading.label ]] is in Danger.

                      Current Reading: {{ states('[[ reading.expected_entity_id ]]') }} {{ state_attr('[[ reading.expected_entity_id ]]', 'unit_of_measurement') or '' }}.
                      Active threshold: {{ threshold }}.
                      Danger evidence: {{ observed | round(1) }}% of the last {{ window }} seconds (about {{ danger_seconds }} seconds); {{ states('[[ reading.required_danger_percent_entity ]]') }}% is required.
                      [[ reading.notification_context ]]
                    notification_id: "labpulse_[[ reading.reading_id ]]_status"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {% set mode = states('[[ reading.alarm_mode_entity ]]') %}
                      {% set minimum = states('[[ reading.minimum_threshold_entity ]]') %}
                      {% set maximum = states('[[ reading.maximum_threshold_entity ]]') %}
                      {% set observed = states('[[ reading.observed_danger_percent_entity ]]') | float(0) %}
                      {% set window = states('[[ reading.observation_window_seconds_entity ]]') | int(120) %}
                      {% set danger_seconds = (observed * window / 100) | round(0) %}
                      {% set threshold = ('below ' ~ minimum if mode == 'Low Only' else 'above ' ~ maximum if mode == 'High Only' else 'outside ' ~ minimum ~ ' to ' ~ maximum) %}
                      {{ {
                        "request_id": "labpulse_[[ reading.reading_id ]]_warning_" ~ now().strftime('%Y%m%dT%H%M%S%f'),
                        "event": "warning",
                        "service": "[[ service.name ]]",
                        "service_label": "[[ service.label ]]",
                        "reading": "[[ reading.name ]]",
                        "reading_label": "[[ reading.label ]]",
                        "state": "Danger",
                        "title": [[ sms.alerts.reading_warning.title ]],
                        "message": ([[ sms.alerts.reading_warning.message ]]) ~ "\n[[ reading.notification_context ]]",
                        "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'),
                        "current_reading": states('[[ reading.expected_entity_id ]]')
                      } | to_json }}

    # Recover only after the deadband-adjusted recovery zone remains continuously
    # true for the configured recovery time.
    - alias: "LabPulse [[ reading.label ]] Recovery"
      mode: single
      trigger:
        - platform: template
          value_template: >
            {{ is_state('[[ service.health_unhealthy_entity ]]', 'off')
               and is_state('[[ service.health_fault_active_entity ]]', 'off')
               and is_state('[[ reading.recovery_zone_entity ]]', 'on') }}
          for:
            seconds: "{{ states('[[ reading.required_recovery_seconds_entity ]]') | int(120) }}"
      condition:
        - condition: state
          entity_id: "[[ reading.alarm_state_entity ]]"
          state: "Danger"
        - condition: state
          entity_id: "[[ reading.sensor_fault_zone_entity ]]"
          state: "off"
      action:
        - service: input_select.select_option
          target:
            entity_id: "[[ reading.alarm_state_entity ]]"
          data:
            option: Normal
        - choose:
            - conditions:
                - condition: state
                  entity_id: "[[ reading.alarm_muted_entity ]]"
                  state: "off"
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
                - condition: template
                  value_template: "[[ reading.setup_notifications_unmuted_template ]]"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] - [[ reading.label ]] recovery' }}
                    message: >
                      [[ service.label ]] / [[ reading.label ]] has recovered.

                      Current Reading: {{ states('[[ reading.expected_entity_id ]]') }} {{ state_attr('[[ reading.expected_entity_id ]]', 'unit_of_measurement') or '' }}.
                      It remained inside the deadband-adjusted recovery zone for {{ states('[[ reading.required_recovery_seconds_entity ]]') }} seconds. Thresholds: {{ states('[[ reading.minimum_threshold_entity ]]') }} to {{ states('[[ reading.maximum_threshold_entity ]]') }}; deadband {{ states('[[ reading.recovery_deadband_entity ]]') }}.
                      [[ reading.notification_context ]]
                    notification_id: "labpulse_[[ reading.reading_id ]]_status"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {{ {
                        "request_id": "labpulse_[[ reading.reading_id ]]_recovery_" ~ now().strftime('%Y%m%dT%H%M%S%f'),
                        "event": "recovery",
                        "service": "[[ service.name ]]",
                        "service_label": "[[ service.label ]]",
                        "reading": "[[ reading.name ]]",
                        "reading_label": "[[ reading.label ]]",
                        "state": "Normal",
                        "title": [[ sms.alerts.reading_recovery.title ]],
                        "message": ([[ sms.alerts.reading_recovery.message ]]) ~ "\n[[ reading.notification_context ]]",
                        "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'),
                        "current_reading": states('[[ reading.expected_entity_id ]]')
                      } | to_json }}

    # Any confirmed fault takes priority over Normal or Danger. MQTT expiry
    # rejects acquisition gaps, then this short second-stage confirmation
    # rejects Home Assistant's transient unavailable states during startup.
    # The alarm state is not changed until confirmation, so routine startup
    # recovery cannot generate a misleading recovery notification.
    - alias: "LabPulse [[ reading.label ]] Sensor Fault"
      mode: restart
      trigger:
        - platform: state
          entity_id: "[[ reading.sensor_fault_zone_entity ]]"
          to: "on"
      action:
        - delay:
            seconds: "[[ service.sensor_fault_confirm_seconds ]]"
        - condition: state
          entity_id: "[[ reading.sensor_fault_zone_entity ]]"
          state: "on"
        - condition: template
          value_template: "{{ not is_state('[[ reading.alarm_state_entity ]]', 'Sensor Fault') }}"
        - service: input_select.select_option
          target:
            entity_id: "[[ reading.alarm_state_entity ]]"
          data:
            option: "Sensor Fault"
        - choose:
            - conditions:
                - condition: state
                  entity_id: "[[ reading.alarm_muted_entity ]]"
                  state: "off"
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
                - condition: template
                  value_template: "[[ reading.setup_notifications_unmuted_template ]]"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] - [[ reading.label ]] sensor fault' }}
                    message: >
                      {% set raw = states('[[ reading.expected_entity_id ]]') %}
                      {% set service_status = states('[[ service.status_entity_id ]]') %}
                      {% set reason = ('the reading is ' ~ raw ~ ', meaning no fresh valid numeric sample is available' if raw in ['unknown', 'unavailable', 'none', 'None', ''] or not is_number(raw) else 'the service status is ' ~ service_status) %}
                      [[ service.label ]] / [[ reading.label ]] has a sensor fault.

                      Reason: {{ reason }}. Service status: {{ service_status }}.
                      Current Reading: {{ raw }}.
                      [[ reading.notification_context ]]
                    notification_id: "labpulse_[[ reading.reading_id ]]_status"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {% set raw = states('[[ reading.expected_entity_id ]]') %}
                      {% set service_status = states('[[ service.status_entity_id ]]') %}
                      {% set reason = ('reading is ' ~ raw ~ '; no fresh valid numeric sample is available' if raw in ['unknown', 'unavailable', 'none', 'None', ''] or not is_number(raw) else 'service status is ' ~ service_status) %}
                      {{ {
                        "request_id": "labpulse_[[ reading.reading_id ]]_sensor_fault_" ~ now().strftime('%Y%m%dT%H%M%S%f'),
                        "event": "sensor_fault",
                        "service": "[[ service.name ]]",
                        "service_label": "[[ service.label ]]",
                        "reading": "[[ reading.name ]]",
                        "reading_label": "[[ reading.label ]]",
                        "state": "Sensor Fault",
                        "title": [[ sms.alerts.reading_sensor_fault.title ]],
                        "message": ([[ sms.alerts.reading_sensor_fault.message ]]) ~ "\n[[ reading.notification_context ]]",
                        "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'),
                        "current_reading": raw
                      } | to_json }}

    # When hardware becomes healthy again, choose the correct current state:
    # Danger if observed danger still exceeds the requirement, otherwise Normal
    # only when the reading is already inside its recovery zone.
    - alias: "LabPulse [[ reading.label ]] Sensor Recovery"
      mode: single
      trigger:
        - platform: state
          entity_id: "[[ reading.sensor_fault_zone_entity ]]"
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: "[[ reading.alarm_state_entity ]]"
          state: "Sensor Fault"
      action:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ not is_state('[[ reading.alarm_mode_entity ]]', 'Disabled')
                       and states('[[ reading.observed_danger_percent_entity ]]') | float(0)
                       >= states('[[ reading.required_danger_percent_entity ]]') | float(70) }}
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: "[[ reading.alarm_state_entity ]]"
                  data:
                    option: Danger
            - conditions:
                - condition: state
                  entity_id: "[[ reading.recovery_zone_entity ]]"
                  state: "on"
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: "[[ reading.alarm_state_entity ]]"
                  data:
                    option: Normal
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ not is_state('[[ reading.alarm_state_entity ]]', 'Sensor Fault') }}"
                - condition: state
                  entity_id: "[[ reading.alarm_muted_entity ]]"
                  state: "off"
                - condition: state
                  entity_id: "[[ model.global_muted_entity ]]"
                  state: "off"
                - condition: template
                  value_template: "[[ reading.setup_notifications_unmuted_template ]]"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: >
                      {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse [[ service.label ]] - [[ reading.label ]] sensor restored' }}
                    message: >
                      [[ service.label ]] / [[ reading.label ]] is reporting valid data again.

                      Current Reading: {{ states('[[ reading.expected_entity_id ]]') }} {{ state_attr('[[ reading.expected_entity_id ]]', 'unit_of_measurement') or '' }}.
                      Service status: {{ states('[[ service.status_entity_id ]]') }}.
                      Alarm state: {{ states('[[ reading.alarm_state_entity ]]') }}.
                      [[ reading.notification_context ]]
                    notification_id: "labpulse_[[ reading.reading_id ]]_status"
                - service: mqtt.publish
                  data:
                    topic: "[[ model.sms_send_topic ]]"
                    qos: 1
                    retain: false
                    payload: >
                      {{ {
                        "request_id": "labpulse_[[ reading.reading_id ]]_sensor_recovery_" ~ now().strftime('%Y%m%dT%H%M%S%f'),
                        "event": "recovery",
                        "service": "[[ service.name ]]",
                        "service_label": "[[ service.label ]]",
                        "reading": "[[ reading.name ]]",
                        "reading_label": "[[ reading.label ]]",
                        "state": states('[[ reading.alarm_state_entity ]]'),
                        "title": [[ sms.alerts.reading_sensor_recovery.title ]],
                        "message": ([[ sms.alerts.reading_sensor_recovery.message ]]) ~ "\n[[ reading.notification_context ]]",
                        "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'),
                        "current_reading": states('[[ reading.expected_entity_id ]]')
                      } | to_json }}
