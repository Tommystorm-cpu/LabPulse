# Direct Geekworm X1200 GPIO6 power lifecycle. GPIO state is confirmed with
# short timers; battery voltage and percentage are telemetry only.

input_numbers:
  - id: "labpulse_[[ service.service_id ]]_power_last_outage_duration"
    config:
      name: "[[ service.label ]] Last Outage Duration"
      min: 0
      max: 604800
      step: 1
      unit_of_measurement: s
      mode: box

input_selects:
  - id: "labpulse_[[ service.service_id ]]_power_state"
    config:
      name: "[[ service.label ]] Power State"
      options:
        - Normal
        - On Battery
        - Sensor Fault

input_booleans:
  - id: "labpulse_[[ service.service_id ]]_power_muted"
    config:
      name: "[[ service.label ]] Power Alerts Muted"
  - id: "labpulse_[[ service.service_id ]]_power_outage_active"
    config:
      name: "[[ service.label ]] Outage Active"
  - id: "labpulse_[[ service.service_id ]]_power_sensor_fault_confirmed"
    config:
      name: "[[ service.label ]] Confirmed GPIO Fault"

input_datetimes:
  - id: "labpulse_[[ service.service_id ]]_power_outage_started"
    config: {name: "[[ service.label ]] Outage Started", has_date: true, has_time: true}
  - id: "labpulse_[[ service.service_id ]]_power_last_outage_started"
    config: {name: "[[ service.label ]] Last Outage Started", has_date: true, has_time: true}

sensors: []

templates:
  - sensor:
      - name: "[[ power.last_outage_started_sensor_unique_id ]]"
        unique_id: "[[ power.last_outage_started_sensor_unique_id ]]"
        icon: mdi:calendar-clock
        state: >
          {% set value = states('[[ power.last_outage_started_entity ]]') %}
          {{ 'Unknown' if value in ['unknown', 'unavailable', 'none', 'None', ''] else value }}
      - name: "[[ power.last_outage_duration_sensor_unique_id ]]"
        unique_id: "[[ power.last_outage_duration_sensor_unique_id ]]"
        icon: mdi:timer-outline
        device_class: duration
        unit_of_measurement: s
        state_class: measurement
        state: "{{ states('[[ power.last_outage_duration_entity ]]') | float(0) | round(0) }}"
    binary_sensor:
      - name: "[[ power.mains_present_unique_id ]]"
        unique_id: "[[ power.mains_present_unique_id ]]"
        device_class: power
        availability: "{{ is_number(states('[[ power.mains_present.expected_entity_id ]]')) }}"
        state: "{{ states('[[ power.mains_present.expected_entity_id ]]') | float(0) >= 0.5 }}"
        attributes:
          source: "[[ power.source ]]"
          gpio_chip: "[[ power.gpio_chip ]]"
          gpio_line: "[[ power.gpio_line ]]"
          configured_active_high: "[[ power.mains_present_active_high ]]"
          meaning: "On means external power present; off means running on UPS battery"
      - name: "[[ power.sensor_fault_unique_id ]]"
        unique_id: "[[ power.sensor_fault_unique_id ]]"
        device_class: problem
        state: >
          {% set raw = states('[[ power.mains_present.expected_entity_id ]]') %}
          {% set status = states('[[ service.status_entity_id ]]') %}
          {{ not is_number(raw) or status == 'gpio_fault' }}
        attributes:
          raw_mains_state: "{{ states('[[ power.mains_present.expected_entity_id ]]') }}"
          service_status: "{{ states('[[ service.status_entity_id ]]') }}"
          maximum_reading_age_seconds: "[[ power.maximum_reading_age_seconds ]]"

automations:
  - id: "labpulse_[[ service.service_id ]]_power_outage_confirm"
    alias: "LabPulse [[ service.label ]] Outage Confirm"
    mode: single
    trigger:
      - platform: state
        entity_id: "[[ power.mains_present_entity ]]"
        to: "off"
        for: {seconds: "[[ power.outage_confirm_seconds ]]"}
    condition:
      - condition: state
        entity_id: "[[ power.outage_active_entity ]]"
        state: "off"
      - condition: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        state: "off"
    action:
      - variables:
          outage_start: "{{ as_timestamp(trigger.to_state.last_changed, as_timestamp(now())) }}"
      - service: input_datetime.set_datetime
        target: {entity_id: "[[ power.outage_started_entity ]]"}
        data: {timestamp: "{{ outage_start }}"}
      - service: input_boolean.turn_on
        target: {entity_id: "[[ power.outage_active_entity ]]"}
      - service: input_select.select_option
        target: {entity_id: "[[ power.state_entity ]]"}
        data: {option: "On Battery"}
      - choose:
          - conditions:
              - condition: state
                entity_id: "[[ power.muted_entity ]]"
                state: "off"
              - condition: state
                entity_id: "[[ model.global_muted_entity ]]"
                state: "off"
            sequence:
              - service: persistent_notification.create
                data:
                  title: >
                    {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse external power lost' }}
                  message: >
                    [[ service.label ]] has directly detected loss of external power on GPIO[[ power.gpio_line ]]. The monitor is running on UPS battery. Battery level: {{ states('[[ power.battery_level.expected_entity_id ]]') }}%. Battery voltage: {{ states('[[ power.voltage.expected_entity_id ]]') }} V.
                  notification_id: "labpulse_[[ service.service_id ]]_power"
              - service: mqtt.publish
                data:
                  topic: "[[ model.sms_send_topic ]]"
                  qos: 1
                  retain: false
                  payload: >
                    {{ {"request_id": "labpulse_[[ service.service_id ]]_power_warning_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "warning", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "power", "reading_label": "External power", "state": "On Battery", "title": [[ sms.alerts.power_warning.title ]], "message": [[ sms.alerts.power_warning.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ power.voltage.expected_entity_id ]]')} | to_json }}

  - id: "labpulse_[[ service.service_id ]]_power_recovery_confirm"
    alias: "LabPulse [[ service.label ]] Recovery Confirm"
    mode: single
    trigger:
      - platform: state
        entity_id: "[[ power.mains_present_entity ]]"
        to: "on"
        for: {seconds: "[[ power.restore_confirm_seconds ]]"}
    condition:
      - condition: state
        entity_id: "[[ power.outage_active_entity ]]"
        state: "on"
      - condition: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        state: "off"
    action:
      - variables:
          outage_start: "{{ as_timestamp(states('[[ power.outage_started_entity ]]'), as_timestamp(now())) }}"
          recovery_start: "{{ as_timestamp(trigger.to_state.last_changed, as_timestamp(now())) }}"
          outage_duration: "{{ [0, recovery_start - outage_start] | max | round(0) }}"
      - service: input_datetime.set_datetime
        target: {entity_id: "[[ power.last_outage_started_entity ]]"}
        data: {timestamp: "{{ outage_start }}"}
      - service: input_number.set_value
        target: {entity_id: "[[ power.last_outage_duration_entity ]]"}
        data: {value: "{{ outage_duration }}"}
      - service: input_boolean.turn_off
        target: {entity_id: "[[ power.outage_active_entity ]]"}
      - service: input_select.select_option
        target: {entity_id: "[[ power.state_entity ]]"}
        data: {option: "Normal"}
      - choose:
          - conditions:
              - condition: state
                entity_id: "[[ power.muted_entity ]]"
                state: "off"
              - condition: state
                entity_id: "[[ model.global_muted_entity ]]"
                state: "off"
            sequence:
              - service: persistent_notification.create
                data:
                  title: >
                    {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse external power restored' }}
                  message: >
                    [[ service.label ]] has directly detected restored external power after {{ outage_duration }} seconds. Battery level: {{ states('[[ power.battery_level.expected_entity_id ]]') }}%. Battery voltage: {{ states('[[ power.voltage.expected_entity_id ]]') }} V.
                  notification_id: "labpulse_[[ service.service_id ]]_power"
              - service: mqtt.publish
                data:
                  topic: "[[ model.sms_send_topic ]]"
                  qos: 1
                  retain: false
                  payload: >
                    {{ {"request_id": "labpulse_[[ service.service_id ]]_power_recovery_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "recovery", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "power", "reading_label": "External power", "state": "Normal", "title": [[ sms.alerts.power_recovery.title ]], "message": [[ sms.alerts.power_recovery.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ power.voltage.expected_entity_id ]]')} | to_json }}

  - id: "labpulse_[[ service.service_id ]]_power_sensor_fault"
    alias: "LabPulse [[ service.label ]] Power Sensor Fault"
    mode: restart
    trigger:
      - platform: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        to: "on"
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
    action:
      - delay: {seconds: 2}
      - condition: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        state: "on"
      - condition: state
        entity_id: "[[ power.sensor_fault_confirmed_entity ]]"
        state: "off"
      - service: input_boolean.turn_on
        target: {entity_id: "[[ power.sensor_fault_confirmed_entity ]]"}
      - service: input_select.select_option
        target: {entity_id: "[[ power.state_entity ]]"}
        data: {option: "Sensor Fault"}
      - choose:
          - conditions:
              - condition: state
                entity_id: "[[ power.muted_entity ]]"
                state: "off"
              - condition: state
                entity_id: "[[ model.global_muted_entity ]]"
                state: "off"
            sequence:
              - service: persistent_notification.create
                data:
                  title: >
                    {{ ('[TEST] ' if is_state('[[ model.test_mode_entity ]]', 'on') else '') ~ 'LabPulse external-power sensor fault' }}
                  message: >
                    [[ service.label ]] cannot read the X1200 external-power signal. Raw mains state: {{ states('[[ power.mains_present.expected_entity_id ]]') }}. Service status: {{ states('[[ service.status_entity_id ]]') }}. This is not being treated as an outage.
                  notification_id: "labpulse_[[ service.service_id ]]_power"
              - service: mqtt.publish
                data:
                  topic: "[[ model.sms_send_topic ]]"
                  qos: 1
                  retain: false
                  payload: >
                    {{ {"request_id": "labpulse_[[ service.service_id ]]_power_sensor_fault_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "sensor_fault", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "power", "reading_label": "External-power GPIO", "state": "Sensor Fault", "title": [[ sms.alerts.power_sensor_fault.title ]], "message": [[ sms.alerts.power_sensor_fault.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ power.mains_present.expected_entity_id ]]')} | to_json }}

  - id: "labpulse_[[ service.service_id ]]_power_sensor_recovery"
    alias: "LabPulse [[ service.label ]] Power Sensor Recovery"
    mode: single
    trigger:
      - platform: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        from: "on"
        to: "off"
    condition:
      - condition: state
        entity_id: "[[ power.sensor_fault_confirmed_entity ]]"
        state: "on"
    action:
      - service: input_boolean.turn_off
        target: {entity_id: "[[ power.sensor_fault_confirmed_entity ]]"}
      - choose:
          - conditions: "{{ is_state('[[ power.outage_active_entity ]]', 'on') }}"
            sequence:
              - service: input_select.select_option
                target: {entity_id: "[[ power.state_entity ]]"}
                data: {option: "On Battery"}
        default:
          - service: input_select.select_option
            target: {entity_id: "[[ power.state_entity ]]"}
            data: {option: "Normal"}

  - id: "labpulse_[[ service.service_id ]]_power_reconcile"
    alias: "LabPulse [[ service.label ]] Power Reconcile"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
    action:
      - delay: {seconds: 1}
      - choose:
          - conditions: "{{ is_state('[[ power.sensor_fault_entity ]]', 'on') and is_state('[[ power.sensor_fault_confirmed_entity ]]', 'on') }}"
            sequence:
              - service: input_select.select_option
                target: {entity_id: "[[ power.state_entity ]]"}
                data: {option: "Sensor Fault"}
          - conditions: "{{ is_state('[[ power.outage_active_entity ]]', 'on') and is_state('[[ power.mains_present_entity ]]', 'off') }}"
            sequence:
              - service: input_select.select_option
                target: {entity_id: "[[ power.state_entity ]]"}
                data: {option: "On Battery"}
          - conditions: "{{ is_state('[[ power.outage_active_entity ]]', 'off') and is_state('[[ power.mains_present_entity ]]', 'on') }}"
            sequence:
              - service: input_select.select_option
                target: {entity_id: "[[ power.state_entity ]]"}
                data: {option: "Normal"}

  - id: "labpulse_[[ service.service_id ]]_power_reconcile_outage"
    alias: "LabPulse [[ service.label ]] Reconcile Missed Outage"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
    action:
      - delay: {seconds: "[[ power.outage_confirm_seconds ]]"}
      - condition: state
        entity_id: "[[ power.mains_present_entity ]]"
        state: "off"
      - condition: state
        entity_id: "[[ power.outage_active_entity ]]"
        state: "off"
      - condition: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        state: "off"
      - service: input_datetime.set_datetime
        target: {entity_id: "[[ power.outage_started_entity ]]"}
        data: {timestamp: "{{ as_timestamp(now()) - [[ power.outage_confirm_seconds ]] }}"}
      - service: input_boolean.turn_on
        target: {entity_id: "[[ power.outage_active_entity ]]"}
      - service: input_select.select_option
        target: {entity_id: "[[ power.state_entity ]]"}
        data: {option: "On Battery"}
      - choose:
          - conditions:
              - condition: state
                entity_id: "[[ power.muted_entity ]]"
                state: "off"
              - condition: state
                entity_id: "[[ model.global_muted_entity ]]"
                state: "off"
            sequence:
              - service: mqtt.publish
                data:
                  topic: "[[ model.sms_send_topic ]]"
                  qos: 1
                  retain: false
                  payload: >
                    {{ {"request_id": "labpulse_[[ service.service_id ]]_power_warning_reconcile_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "warning", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "power", "reading_label": "External power", "state": "On Battery", "title": [[ sms.alerts.power_warning.title ]], "message": [[ sms.alerts.power_warning.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ power.voltage.expected_entity_id ]]')} | to_json }}

  - id: "labpulse_[[ service.service_id ]]_power_reconcile_recovery"
    alias: "LabPulse [[ service.label ]] Reconcile Missed Recovery"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
    action:
      - delay: {seconds: "[[ power.restore_confirm_seconds ]]"}
      - condition: state
        entity_id: "[[ power.mains_present_entity ]]"
        state: "on"
      - condition: state
        entity_id: "[[ power.outage_active_entity ]]"
        state: "on"
      - condition: state
        entity_id: "[[ power.sensor_fault_entity ]]"
        state: "off"
      - variables:
          outage_start: "{{ as_timestamp(states('[[ power.outage_started_entity ]]'), as_timestamp(now())) }}"
          outage_duration: "{{ [0, as_timestamp(now()) - outage_start] | max | round(0) }}"
      - service: input_datetime.set_datetime
        target: {entity_id: "[[ power.last_outage_started_entity ]]"}
        data: {timestamp: "{{ outage_start }}"}
      - service: input_number.set_value
        target: {entity_id: "[[ power.last_outage_duration_entity ]]"}
        data: {value: "{{ outage_duration }}"}
      - service: input_boolean.turn_off
        target: {entity_id: "[[ power.outage_active_entity ]]"}
      - service: input_select.select_option
        target: {entity_id: "[[ power.state_entity ]]"}
        data: {option: "Normal"}
      - choose:
          - conditions:
              - condition: state
                entity_id: "[[ power.muted_entity ]]"
                state: "off"
              - condition: state
                entity_id: "[[ model.global_muted_entity ]]"
                state: "off"
            sequence:
              - service: mqtt.publish
                data:
                  topic: "[[ model.sms_send_topic ]]"
                  qos: 1
                  retain: false
                  payload: >
                    {{ {"request_id": "labpulse_[[ service.service_id ]]_power_recovery_reconcile_" ~ now().strftime('%Y%m%dT%H%M%S%f'), "event": "recovery", "service": "[[ service.name ]]", "service_label": "[[ service.label ]]", "reading": "power", "reading_label": "External power", "state": "Normal", "title": [[ sms.alerts.power_recovery.title ]], "message": [[ sms.alerts.power_recovery.message ]], "test_mode": is_state('[[ model.test_mode_entity ]]', 'on'), "current_reading": states('[[ power.voltage.expected_entity_id ]]')} | to_json }}
