# ==========================================
# LabPulse Starter Configuration Template
# ==========================================
#
# On the Raspberry Pi, edit the live config here:
#
#   ~/labpulse-ha/config.yaml
#
# This repo file is only copied as a starter template when the live config
# does not already exist.
# Per-reading Min, Max, and Deadband values live in the adjacent
# ~/labpulse-ha/alarm_defaults.json file.

# --- Global Settings ---
mqtt:
  broker: "localhost" # change to mosquitto later and remove from the setup shell script
  port: 1883

sms:
  # Keep true for safe testing; set false on the real Pi to send through mmcli.
  dry_run: true
  # Emergency contact numbers for system alerts
  recipients:
    - "+447700900000"
  # Test-mode alerts are routed only to these numbers.
  test_recipients:
    - "+447700900001"

services:
  # Ordinary readings expire in Home Assistant after 300 seconds without an
  # MQTT sample. Override maximum_reading_age_seconds per service if needed.
  pressure_monitor:
    enabled: true
    driver: serial
    parser: pressure
    serial_port: "FAKE_PRESSURE_PORT"
    baud_rate: 9600
    device_name: "Air Pressure Sensor Hub"
    display:
      section: "Air Pressure"
      icon: "mdi:gauge"
      order: 40
    readings:
      - name: "pressure"
        label: "Pressure"
        unit: "bar"
        device_class: "pressure"
    reconnect_interval_seconds: 5

  pump_room:
    enabled: true
    driver: serial
    parser: pump_room
    serial_port: "FAKE_PUMP_ROOM_PORT"
    baud_rate: 9600
    device_name: "Pump Room Sensor Hub"
    display:
      section: "Pump Room"
      icon: "mdi:water-pump"
      order: 20
    readings:
      - name: "flow1"
        label: "Flow 1"
        group: "Flow"
        unit: "L/min"
        device_class: "volume_flow_rate"
      - name: "flow2"
        label: "Flow 2"
        group: "Flow"
        unit: "L/min"
        device_class: "volume_flow_rate"
      - name: "temp0"
        label: "Temperature 0"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp1"
        label: "Temperature 1"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp2"
        label: "Temperature 2"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp3"
        label: "Temperature 3"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "press1"
        label: "Pressure 1"
        group: "Pressure"
        unit: "bar"
        device_class: "pressure"
      - name: "press2"
        label: "Pressure 2"
        group: "Pressure"
        unit: "bar"
        device_class: "pressure"
      - name: "roomtemp"
        label: "Room Temperature"
        group: "Pump Room Environment Sensor"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "roomhum"
        label: "Room Humidity"
        group: "Pump Room Environment Sensor"
        unit: "%"
        device_class: "humidity"
    reconnect_interval_seconds: 5

  turbo_pump:
    enabled: true
    driver: serial
    parser: water
    serial_port: "FAKE_TURBO_PUMP_PORT"
    baud_rate: 9600
    device_name: "Turbo Pump Hub"
    display:
      section: "Cryogenics Room"
      icon: "mdi:snowflake-thermometer"
      order: 30
    readings:
      - name: "flow1"
        label: "Flow 1"
        group: "Flow"
        unit: "L/min"
        device_class: "volume_flow_rate"
      - name: "flow2"
        label: "Flow 2"
        group: "Flow"
        unit: "L/min"
        device_class: "volume_flow_rate"
      - name: "temp0"
        label: "Temperature 0"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp1"
        label: "Temperature 1"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp2"
        label: "Temperature 2"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "temp3"
        label: "Temperature 3"
        group: "Water Temperatures"
        unit: "\u00b0C"
        device_class: "temperature"
    reconnect_interval_seconds: 5

  room_environment:
    enabled: true
    driver: gpio
    gpio_sensor: dht11
    gpio_pin: "D4"
    device_name: "Cryogenics Room Environment Sensor"
    display:
      section: "Cryogenics Room"
      icon: "mdi:home-thermometer"
      order: 50
    readings:
      - name: "temperature"
        label: "Room Temperature"
        unit: "\u00b0C"
        device_class: "temperature"
      - name: "humidity"
        label: "Room Humidity"
        unit: "%"
        device_class: "humidity"
    read_interval_seconds: 2

