# ==========================================
# LabPulse Starter Configuration Template
# ==========================================
#
# On the Raspberry Pi, edit the live config here:
#
#   ~/labpulse-ha/config.yaml
#
# This repo file is only copied as a starter template when the live config
# does not already exist.

# --- Global Settings ---
mqtt:
  broker: "localhost" # change to mosquitto later and remove from the setup shell script
  port: 1883

sms:
  # Emergency contact numbers for system alerts
  recipients:
    - "+447955656806"
    - "+447753180741"
    - "+447474510525"
    - "+4915204304823"
    - "+447873257640"
    - "+447724548990"
    - "+447864783617"
    - "+447568737172"

services:
  pressure_monitor:
    enabled: true
    driver: serial
    parser: pressure
    serial_port: "/dev/serial/by-id/..."
    baud_rate: 9600
    device_name: "Air Pressure Sensor Hub"
    display:
      section: "Air Pressure"
      icon: "mdi:gauge"
      order: 40
    readings:
      - name: "pressure"
        label: "Pressure"
        unit: "bar"
        device_class: "pressure"
        alarm:
          mode: "min"
          min: 1
          range_min: 0
          range_max: 10
          step: 0.1
    reconnect_interval_seconds: 5

  pump_room:
    enabled: true
    driver: serial
    parser: pump_room
    serial_port: "/dev/serial/by-id/..."
    baud_rate: 9600
    device_name: "Pump Room Sensor Hub"
    display:
      section: "Pump Room"
      icon: "mdi:water-pump"
      order: 20
    readings:
      - name: "flow1"
        label: "Flow 1"
        unit: "L/min"
        alarm:
          mode: "min"
          min: 1
          range_min: 0
          range_max: 20
          step: 0.1
      - name: "flow2"
        label: "Flow 2"
        unit: "L/min"
        alarm:
          mode: "min"
          min: 1
          range_min: 0
          range_max: 20
          step: 0.1
      - name: "temp0"
        label: "Temperature 0"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp1"
        label: "Temperature 1"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp2"
        label: "Temperature 2"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp3"
        label: "Temperature 3"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
    reconnect_interval_seconds: 5

  turbo_pump:
    enabled: true
    driver: serial
    parser: water
    serial_port: "/dev/serial/by-id/..."
    baud_rate: 9600
    device_name: "Turbo Pump Hub"
    display:
      section: "Cryogenics"
      icon: "mdi:snowflake-alert"
      order: 30
    readings:
      - name: "flow1"
        label: "Flow 1"
        unit: "L/min"
        alarm:
          mode: "min"
          min: 1
          range_min: 0
          range_max: 20
          step: 0.1
      - name: "flow2"
        label: "Flow 2"
        unit: "L/min"
        alarm:
          mode: "min"
          min: 1
          range_min: 0
          range_max: 20
          step: 0.1
      - name: "temp0"
        label: "Temperature 0"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp1"
        label: "Temperature 1"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp2"
        label: "Temperature 2"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
      - name: "temp3"
        label: "Temperature 3"
        unit: "\u00b0C"
        device_class: "temperature"
        alarm:
          mode: "range"
          min: 5
          max: 35
          range_min: -20
          range_max: 80
          step: 0.1
    reconnect_interval_seconds: 5

