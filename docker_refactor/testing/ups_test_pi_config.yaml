mqtt:
  broker: mosquitto
  port: 1883

sms:
  # Simulation must never contact a real modem.
  dry_run: true
  recipients:
    - "+447700900000"
  test_recipients:
    - "+447700900001"

service_health:
  fault_confirm_seconds: 10
  recovery_confirm_seconds: 15

setups: {}

services:
  ups_monitor:
    enabled: true
    driver: serial
    parser: ups_simulator
    serial_port: "/tmp/labpulse-fake-serial/ups_monitor"
    baud_rate: 9600
    device_name: "UPS Monitor"
    readings:
      - name: "voltage"
        label: "UPS Battery Voltage"
        unit: "V"
        device_class: "voltage"
      - name: "battery_level"
        label: "UPS Battery Level"
        unit: "%"
        device_class: "battery"
      - name: "mains_present"
        label: "External Power Present"
        state_class: null
    reconnect_interval_seconds: 5
    read_interval_seconds: 1
    maximum_reading_age_seconds: 15
    power_detection:
      source: x1200_gpio
      gpio_chip: "/dev/gpiochip0"
      gpio_line: 6
      mains_present_active_high: true
      outage_confirm_seconds: 3
      restore_confirm_seconds: 5
