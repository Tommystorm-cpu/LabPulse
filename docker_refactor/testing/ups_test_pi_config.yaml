mqtt:
  broker: mosquitto
  port: 1883

sms:
  # Simulation must never contact a real modem.
  dry_run: true
  recipients:
    - "+447700900000"
  test_recipients:
    - "+447700900001"

services:
  ups_monitor:
    enabled: true
    driver: serial
    parser: ups_simulator
    serial_port: "/tmp/labpulse-fake-serial/ups_monitor"
    baud_rate: 9600
    device_name: "UPS Monitor"
    display:
      section: "UPS Power"
      icon: "mdi:battery-charging"
      order: 10
    readings:
      - name: "voltage"
        label: "UPS Battery Voltage"
        unit: "V"
        device_class: "voltage"
      - name: "battery_level"
        label: "UPS Battery Level"
        unit: "%"
        device_class: "battery"
    reconnect_interval_seconds: 5
    read_interval_seconds: 1
    power_detection:
      source: ups_voltage_inference
      low_voltage_threshold: 4.0
      outage_confirm_seconds: 10
      restore_confirm_seconds: 15
      maximum_reading_age_seconds: 15
