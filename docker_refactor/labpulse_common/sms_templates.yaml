# Single source of truth for every user-facing LabPulse SMS template.
#
# Alert title/message values are Home Assistant Jinja expressions. LabPulse
# placeholders such as [[ service.label ]] are expanded by the generator before
# Home Assistant receives the generated package. The SMS worker replaces
# {current_reading} after Home Assistant has evaluated the surrounding message.

alerts:
  service_fault:
    title: >-
      "LabPulse Service Fault: [[ service.label ]]"
    message: >-
      "LabPulse cannot communicate with [[ service.label ]]. All readings from this service are temporarily unavailable.\nService status: {current_reading}."

  service_recovery:
    title: >-
      "LabPulse Service Restored: [[ service.label ]]"
    message: >-
      "Communication with [[ service.label ]] has been restored. Telemetry is available again.\nDowntime: " ~ (downtime_seconds | string) ~ " seconds.\nService status: {current_reading}."

  reading_warning:
    title: >-
      "LabPulse Danger Warning: [[ service.label ]] - [[ reading.label ]] is in danger"
    message: >-
      "Current Reading: {current_reading}. \nDanger threshold: " ~ threshold ~ ". \nEvidence: " ~ (observed | round(1) | string) ~ "% of the past " ~ (window | string) ~ " seconds spent in danger zone; required " ~ states('[[ service.required_danger_percent_entity ]]') ~ "% for warning. \nManual intervention may be required."

  reading_recovery:
    title: >-
      "LabPulse Recovery Alert: [[ service.label ]] - [[ reading.label ]] has recovered from a danger state."
    message: >-
      "Current Reading: {current_reading}. \nRecovered after " ~ states('[[ service.required_recovery_seconds_entity ]]') ~ " seconds in the deadband-adjusted safe zone. \nThresholds: " ~ states('[[ reading.minimum_threshold_entity ]]') ~ " to " ~ states('[[ reading.maximum_threshold_entity ]]') ~ "; deadband " ~ states('[[ reading.recovery_deadband_entity ]]') ~ "."

  reading_sensor_fault:
    title: >-
      "LabPulse Sensor Fault Alert: [[ service.label ]] - [[ reading.label ]]"
    message: >-
      "Sensor fault reason: " ~ reason ~ ". \nService status: " ~ service_status ~ "." ~ "\nCurrent Reading: {current_reading}"

  reading_sensor_recovery:
    title: >-
      "LabPulse Sensor Restored: [[ service.label ]] - [[ reading.label ]]"
    message: >-
      "Valid numeric telemetry resumed. \nService status: " ~ states('[[ service.status_entity_id ]]') ~ ". \nAlarm state: " ~ states('[[ reading.alarm_state_entity ]]') ~ "." ~ "\nCurrent Reading: {current_reading}"

  power_warning:
    title: >-
      "LabPulse Power Outage Alert"
    message: >-
      "External power has been lost and [[ service.label ]] is running on UPS battery. " ~ "Battery level: " ~ (states('[[ power.battery_level.expected_entity_id ]]') ~ "%" if is_number(states('[[ power.battery_level.expected_entity_id ]]')) else "unavailable") ~ ".\nBattery voltage: {current_reading} V.\nThe GPIO6 signal remained absent for [[ power.outage_confirm_seconds ]] seconds."

  power_recovery:
    title: >-
      "LabPulse Power Recovery Alert"
    message: >-
      "External power has been restored after " ~ (outage_duration | string) ~ " seconds. " ~ "Battery level: " ~ (states('[[ power.battery_level.expected_entity_id ]]') ~ "%" if is_number(states('[[ power.battery_level.expected_entity_id ]]')) else "unavailable") ~ ".\nBattery voltage: {current_reading} V.\nThe GPIO6 signal remained present for [[ power.restore_confirm_seconds ]] seconds."

  power_sensor_fault:
    title: >-
      "LabPulse Sensor Fault Alert: [[ service.label ]] - External Power Detection"
    message: >-
      "The X1200 GPIO6 external-power signal is unavailable or invalid. This is being treated as a sensor fault, not a power outage.\nRaw GPIO state: {current_reading}.\nService status: " ~ states('[[ service.status_entity_id ]]') ~ "."

  power_sensor_recovery:
    title: >-
      "LabPulse Sensor Restored: [[ service.label ]] - External Power Detection"
    message: >-
      "The X1200 GPIO6 external-power signal is available again.\nCurrent mains state: {current_reading}.\nService status: " ~ states('[[ service.status_entity_id ]]') ~ "."

formatting:
  test_prefix: "[TEST]"
  unsubscribe_footer: >-
    If you wish to stop receiving messages from LabPulse, reply with UNSUBSCRIBE. To resubscribe, message SUBSCRIBE

commands:
  unsubscribe_confirmation: >-
    You have been unsubscribed from LabPulse messages. Reply SUBSCRIBE to receive messages again.
  subscribe_confirmation: >-
    You have been subscribed to LabPulse messages. Reply UNSUBSCRIBE to stop receiving messages.
