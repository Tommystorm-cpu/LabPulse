automation:
- alias: LabPulse Pressure Alert
  mode: single
  trigger:
  - platform: template
    value_template: '{{ states(''sensor.real_air_pressure'') | float(0) < states(''input_number.labpulse_pressure_monitor_pressure_minimum_threshold'')
      | float(0) }}'
    for:
      seconds: '{{ states(''input_number.labpulse_pressure_monitor_alert_delay_seconds'')
        | int(2) }}'
  condition:
  - condition: state
    entity_id: input_boolean.labpulse_pressure_monitor_pressure_alert_active
    state: 'off'
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.labpulse_pressure_monitor_pressure_alert_active
  - service: persistent_notification.create
    data:
      title: LabPulse Pressure alert
      message: 'Pressure is outside its threshold.


        Current reading: {{ states(''sensor.real_air_pressure'') }}.

        Min: {{ states(''input_number.labpulse_pressure_monitor_pressure_minimum_threshold'')
        }}.'
      notification_id: labpulse_pressure_monitor_pressure_status
- alias: LabPulse Pressure Recovery
  mode: single
  trigger:
  - platform: template
    value_template: '{{ states(''sensor.real_air_pressure'') | float(0) >= states(''input_number.labpulse_pressure_monitor_pressure_minimum_threshold'')
      | float(0) }}'
    for:
      seconds: '{{ states(''input_number.labpulse_pressure_monitor_recovery_delay_seconds'')
        | int(2) }}'
  condition:
  - condition: state
    entity_id: input_boolean.labpulse_pressure_monitor_pressure_alert_active
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.labpulse_pressure_monitor_pressure_alert_active
  - service: persistent_notification.create
    data:
      title: LabPulse Pressure recovered
      message: 'Pressure has recovered.


        Current reading: {{ states(''sensor.real_air_pressure'') }}.

        Min: {{ states(''input_number.labpulse_pressure_monitor_pressure_minimum_threshold'')
        }}.'
      notification_id: labpulse_pressure_monitor_pressure_status
